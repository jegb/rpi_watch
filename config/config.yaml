display:
  # SPI Configuration (Raspberry Pi hardware SPI)
  spi_bus: 0                 # SPI bus 0 (/dev/spidev0.x)
  spi_device: 0              # SPI device 0 (/dev/spidev0.0 -> panel CS on GPIO 8)
  spi_speed: 20000000       # Clock speed 20 MHz (validated on current hardware)

  # Display control GPIOs (BCM numbering)
  spi_dc_pin: 25             # GPIO 25 - Data/Command line (DC/RS)
  spi_reset_pin: 27          # GPIO 27 - Reset line (RES)
  spi_cs_pin: 8              # GPIO 8 - Panel chip select, driven manually for microcontroller-style four-wire framing
  spi_manual_cs: true        # Disable hardware CE and hold CS low across command+data transactions

  # Display Settings
  width: 240
  height: 240
  rotation: 0                # 0, 90, 180, 270 degrees
  madctl: 0x48              # GC9A01 memory access order. Try 0x08, 0x48, or 0x88 if the panel shows striping/greys
  refresh_rate_hz: 5         # Updates per second (SPI can handle higher refresh rates)

mqtt:
  broker_host: "192.168.0.214"   # SPS Monitor MQTT broker
  broker_port: 1883
  topic: "airquality/sensor"     # SPS Monitor topic (publishes JSON with pm_2_5, temp, humidity, pm_1_0, pm_4_0, pm_10_0)
  qos: 1                         # Quality of service level (0=at most once, 1=at least once, 2=exactly once)
  keepalive: 60                  # Seconds between MQTT keepalive pings
  json_field: "pm_2_5"           # Legacy preferred field hint. Subscriber now stores the full payload either way.

state:
  cache_path: "data/metric_store.json"  # Last known payload/history cache used to seed startup before MQTT refreshes
  history_size: 50

metric_display:
  layout_mode: "single_metric"   # single_metric, pm_bars, metric_ring
  color_scheme: "BRIGHT"         # BRIGHT, OCEAN, FOREST, SUNSET, MONOCHROME
  metric_key: "pm_2_5"           # Preferred field to render from a multi-metric MQTT payload
  rotate_metrics: true           # Cycle through fields from the latest payload instead of pinning one metric
  rotate_interval_seconds: 6.0   # Seconds each metric stays on screen before switching
  rotate_fields: ["pm_1_0", "pm_2_5", "pm_4_0", "pm_10_0", "temp", "humidity"]
  title_label: "PM2.5"           # Small label above the large value
  decimal_places: 1
  font_size: 108             # Large centered numeric display; slightly reduced to leave more breathing room
  title_font_size: 30        # Title label above the main value
  unit_font_size: 30         # Separate unit label below the number
  font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
  unit_label: "µg/m³"        # PM2.5 concentration in micrograms per cubic meter
  padding: 18                # Horizontal margin used by font auto-fit
  title_gap: 12              # Vertical gap between the title line and the main value
  unit_gap: 10               # Vertical gap between the main value and the unit line
  show_sparkline: true       # Show a trailing sparkline on the single_metric layout
  sparkline_points: 10       # Tail history length for sparkline rendering
  sparkline_height: 34       # Sparkline height in pixels
  sparkline_gap: 12          # Gap between the main metric block and the sparkline
  sparkline_line_color: [92, 172, 255]
  show_placeholder: true     # Show a placeholder until the first MQTT value arrives
  placeholder_text: "--.-"   # Placeholder metric when MQTT is offline or no reading has arrived yet
  placeholder_title_label: "PM2.5"
  placeholder_unit_label: "µg/m³"
  pm_bars_title: "Particle"
  pm_bars_unit_label: "µg/m³"
  pm_bars_axis_label: "PM"
  pm_bars_auto_scale_floor: 25.0
  pm_bars_scale_padding_ratio: 0.18   # Shared bars scale to max reading plus this headroom ratio
  pm_bars_orientation: "vertical"     # horizontal or vertical
  pm_bars_gap: 6                      # Bar row/column gap in pixels
  pm_bar_fields: ["pm_1_0", "pm_2_5", "pm_4_0", "pm_10_0"]
  pm_bars_colors:
    pm_1_0: [92, 172, 255]
    pm_2_5: [0, 214, 143]
    pm_4_0: [255, 195, 0]
    pm_10_0: [255, 107, 53]
  ring_field: "pm_2_5"       # Preferred field when metric_ring rotation is disabled
  ring_min_value: 0.0
  ring_max_value: 40.0
  ring_start_angle: 135.0
  ring_end_angle: 405.0
  ring_thickness: 20          # Controllable ring width in pixels
  ring_rounded_caps: true
  ring_inner_margin: 54     # Extra center padding so the title/value/unit block does not crowd the ring
  ring_title_font_size: 20
  ring_value_font_size: 82
  ring_unit_font_size: 18
  ring_title_gap: 8
  ring_unit_gap: 6
  ring_track_color: [52, 52, 52]
  ring_thresholds:            # Fallback gradient used if a field has no explicit ring profile
    - value: 0.0
      color: [64, 128, 255]
    - value: 22.0
      color: [0, 220, 120]
    - value: 35.0
      color: [255, 96, 64]
  ring_profiles:
    temp:
      min_value: 0.0
      max_value: 40.0
      thresholds:
        - value: 0.0
          color: [64, 128, 255]
        - value: 22.0
          color: [0, 220, 120]
        - value: 35.0
          color: [255, 96, 64]
    humidity:
      min_value: 0.0
      max_value: 100.0
      thresholds:
        - value: 0.0
          color: [92, 172, 255]
        - value: 45.0
          color: [0, 220, 120]
        - value: 70.0
          color: [250, 204, 21]
        - value: 85.0
          color: [255, 96, 64]
    pm_1_0:
      min_value: 0.0
      max_value: 25.0
      thresholds:
        - value: 0.0
          color: [92, 172, 255]
        - value: 6.0
          color: [0, 214, 143]
        - value: 12.0
          color: [255, 195, 0]
        - value: 20.0
          color: [255, 107, 53]
    pm_4_0:
      min_value: 0.0
      max_value: 40.0
      thresholds:
        - value: 0.0
          color: [92, 172, 255]
        - value: 10.0
          color: [0, 214, 143]
        - value: 20.0
          color: [255, 195, 0]
        - value: 30.0
          color: [255, 107, 53]
  text_color: [255, 255, 255]    # RGB white
  background_color: [0, 0, 0]    # RGB black

logging:
  level: "INFO"              # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
